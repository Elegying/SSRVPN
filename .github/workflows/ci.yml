name: SSRVPN CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.44.1'

jobs:
  shared:
    name: Shared package
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/ssrvpn_shared
    steps:
      - uses: actions/checkout@v7

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: bash ../../scripts/check-shared-barrel-imports.sh
      - run: bash ../../scripts/check-version-sync.sh
      - run: bash ../../scripts/check-android-native-bridge-guards.sh
      - run: dart pub get
      - run: dart analyze
      - run: dart test --coverage=coverage

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-shared
          path: packages/ssrvpn_shared/coverage

  flutter-app:
    name: ${{ matrix.name }}
    needs: shared
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Android
            os: ubuntu-latest
            directory: SSRVPN_Android
          - name: macOS
            os: macos-15
            directory: SSRVPN_MacOS
          - name: Windows
            os: windows-latest
            directory: SSRVPN_Windows
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: bash scripts/verify-core-assets.sh

      - run: flutter pub get
        working-directory: ${{ matrix.directory }}

      - run: flutter analyze
        working-directory: ${{ matrix.directory }}

      - run: flutter test --coverage
        working-directory: ${{ matrix.directory }}

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-${{ matrix.directory }}
          path: ${{ matrix.directory }}/coverage/lcov.info
