name: SSRVPN CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.44.1'

jobs:
  shared:
    name: Workspace checks
    needs: core-assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: core-assets
          path: .

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: bash scripts/check-core-asset-bootstrap.sh
      - run: bash scripts/check-shared-barrel-imports.sh
      - run: bash scripts/check-version-sync.sh
      - run: bash scripts/check-package-guides.sh
      # Match the Release job's package working directory so guard scripts
      # cannot accidentally depend on being launched from the repository root.
      - run: bash ../../scripts/check-android-native-bridge-guards.sh
        working-directory: packages/ssrvpn_shared
      - run: bash scripts/check-unlock-test-guards.sh
      - run: bash scripts/check-desktop-startup-guards.sh
      - run: bash scripts/check-clash-service-boundaries.sh
      - run: bash scripts/check-macos-core-privileges.sh
      - run: bash scripts/check-windows-launcher-security.sh
      - run: bash scripts/check-secrets.sh
      - run: python3 -m unittest scripts/test_generate_release_notes.py scripts/test_generate_oss_release_manifest.py scripts/test_generate_release_provenance.py scripts/test_verify_release_transition.py scripts/test_promote_oss_public_channel.py scripts/test_reuse_github_release_assets.py scripts/test_validate_existing_release_retry.py scripts/test_run_command_with_timeout.py scripts/test_windows_installer_config.py scripts/test_windows_proxy_shutdown_recovery.py
      - run: flutter pub get
      - run: flutter analyze
        working-directory: packages/ssrvpn_shared
      - run: flutter test --coverage
        working-directory: packages/ssrvpn_shared
      - run: bash scripts/check-coverage-thresholds.sh packages/ssrvpn_shared

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: coverage-shared
          path: packages/ssrvpn_shared/coverage

  core-assets:
    name: Prepare verified core assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - run: bash scripts/bootstrap-core-assets.sh

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: core-assets
          retention-days: 1
          path: |
            SSRVPN_Android/android/app/src/main/jniLibs/arm64-v8a/libgojni.so
            SSRVPN_Android/assets/geoip.metadb.gz
            SSRVPN_MacOS/assets/AtlasCore.gz
            SSRVPN_MacOS/assets/geoip.metadb.gz
            SSRVPN_Windows/assets/mihomo.exe
            SSRVPN_Windows/assets/geoip.metadb.gz

  flutter-app:
    name: ${{ matrix.name }}
    needs: [shared, core-assets]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Android
            os: ubuntu-latest
            directory: SSRVPN_Android
          - name: macOS
            os: macos-15
            directory: SSRVPN_MacOS
          - name: Windows
            os: windows-latest
            directory: SSRVPN_Windows
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: core-assets
          path: .

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: bash scripts/verify-core-assets.sh

      - run: flutter pub get

      - run: flutter analyze
        working-directory: ${{ matrix.directory }}

      - run: flutter test --coverage
        working-directory: ${{ matrix.directory }}

      - name: Android native unit tests
        if: matrix.directory == 'SSRVPN_Android'
        shell: bash
        run: bash scripts/test-android-native.sh

      - run: bash scripts/check-coverage-thresholds.sh ${{ matrix.directory }}

      - name: Build Windows packages
        if: matrix.directory == 'SSRVPN_Windows'
        shell: powershell
        run: |
          cd SSRVPN_Windows
          foreach ($file in @('installer\prepare_install_directory.ps1', 'installer\stop_ssrvpn_processes.ps1', '..\scripts\test_windows_installer_runtime.ps1')) {
            $tokens = $null
            $parseErrors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path $file), [ref]$tokens, [ref]$parseErrors)
            if ($parseErrors.Count -gt 0) { $parseErrors | ForEach-Object { Write-Error $_ }; exit 1 }
          }
          powershell.exe -NoLogo -NoProfile -ExecutionPolicy Bypass -File ..\scripts\test_windows_installer_runtime.ps1
          powershell.exe -NoLogo -NoProfile -ExecutionPolicy Bypass -File installer\stop_ssrvpn_processes.ps1 -InstalledCorePath "$env:RUNNER_TEMP\ssrvpn-process-smoke\mihomo.exe" -InstalledCorePidPath "$env:RUNNER_TEMP\ssrvpn-process-smoke\mihomo.pid"
          powershell.exe -NoLogo -NoProfile -ExecutionPolicy Bypass -File tool\package_windows.ps1
          powershell.exe -NoLogo -NoProfile -ExecutionPolicy Bypass -File tool\build_installer.ps1

      - name: Smoke Windows packages
        if: matrix.directory == 'SSRVPN_Windows'
        shell: bash
        run: bash scripts/smoke-release-artifacts.sh --allow-missing

      - name: Upload Windows packages
        if: matrix.directory == 'SSRVPN_Windows'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: windows-packages-pr
          path: |
            SSRVPN_Windows/SSRVPN.zip
            SSRVPN_Windows/SSRVPN.zip.sha256
            SSRVPN_Windows/SSRVPN_Setup.exe
            SSRVPN_Windows/SSRVPN_Setup.exe.sha256

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: coverage-${{ matrix.directory }}
          path: ${{ matrix.directory }}/coverage/lcov.info
