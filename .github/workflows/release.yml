name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  actions: read

concurrency:
  # Mutable public aliases and latest.json form one global release channel.
  group: ssrvpn-public-release
  cancel-in-progress: false

env:
  FLUTTER_VERSION: '3.44.1'

jobs:
  validate-source:
    name: Validate release source
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Scan full history for secrets
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Require release source to come from main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git fetch --no-tags origin main:refs/remotes/origin/main
          release_commit="$(git rev-list -n 1 "$GITHUB_SHA")"
          main_tip="$(git rev-parse origin/main)"
          if [ "$release_commit" != "$main_tip" ]; then
            retry_release="$RUNNER_TEMP/existing-release-retry.json"
            retry_provenance_dir="$RUNNER_TEMP/existing-release-provenance"
            if [[ "$GITHUB_REF" == refs/tags/* ]] &&
              gh api "repos/$GITHUB_REPOSITORY/releases/tags/$GITHUB_REF_NAME" \
                >"$retry_release" &&
              mkdir -p "$retry_provenance_dir" &&
              gh release download "$GITHUB_REF_NAME" \
                --repo "$GITHUB_REPOSITORY" \
                --dir "$retry_provenance_dir" \
                --pattern 'SSRVPN-release-provenance.json' &&
              python3 scripts/validate-existing-release-retry.py \
                "$retry_release" \
                "$retry_provenance_dir/SSRVPN-release-provenance.json" \
                --expected-tag "$GITHUB_REF_NAME" \
                --expected-commit "$release_commit"; then
              echo "Retrying existing release $GITHUB_REF_NAME after main advanced."
            else
              echo "::error::New release builds must use the current tested main tip."
              exit 1
            fi
          fi

          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            expected_version="${GITHUB_REF_NAME#v}"
            app_version="$(awk -F"'" '/appVersion = / { print $2; exit }' packages/ssrvpn_shared/lib/constants/app_constants.dart)"
            if [ "$expected_version" != "$app_version" ]; then
              echo "::error::Release tag $GITHUB_REF_NAME does not match app version $app_version."
              exit 1
            fi

            current_full="$(awk '/^version:/ { print $2; exit }' SSRVPN_Android/pubspec.yaml)"
            current_code="${current_full##*+}"
            previous_tag="$(git tag --list 'v*' --sort=-v:refname |
              grep -E '^v[0-9]+(\.[0-9]+){1,3}$' |
              grep -vx "$GITHUB_REF_NAME" | head -1 || true)"
            if [ -n "$previous_tag" ]; then
              previous_full="$(git show "$previous_tag:SSRVPN_Android/pubspec.yaml" |
                awk '/^version:/ { print $2; exit }')"
              previous_code="${previous_full##*+}"
              python3 scripts/verify-release-transition.py \
                --target "$expected_version" \
                --current-version "${previous_tag#v}" \
                --target-build-code "$current_code" \
                --current-build-code "$previous_code"
            fi
          fi

  # ── 共享包测试 ──
  shared-test:
    name: Shared package tests
    needs: [validate-source, prepare-geoip]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/ssrvpn_shared
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Download verified core assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: core-assets
          path: .

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: bash ../../scripts/check-core-asset-bootstrap.sh
      - run: bash ../../scripts/check-shared-barrel-imports.sh
      - run: bash ../../scripts/check-version-sync.sh
      - run: bash ../../scripts/check-package-guides.sh
      - run: bash ../../scripts/check-doc-consistency.sh
      - run: bash ../../scripts/check-android-native-bridge-guards.sh
      - run: bash ../../scripts/check-android-built-in-kotlin.sh
      - run: bash ../../scripts/check-product-surface-guards.sh
      - run: bash ../../scripts/check-desktop-startup-guards.sh
      - run: bash ../../scripts/check-desktop-secure-storage.sh
      - run: bash ../../scripts/check-clash-service-boundaries.sh
      - run: bash ../../scripts/check-macos-core-privileges.sh
      - run: bash ../../scripts/check-windows-launcher-security.sh
      - run: bash ../../scripts/check-secrets.sh
      - run: bash ../../scripts/test-release-tooling.sh
      - run: dart pub get
      - run: flutter analyze --fatal-infos
      - run: flutter test --coverage
      - run: bash ../../scripts/check-coverage-thresholds.sh packages/ssrvpn_shared

  prepare-geoip:
    name: Prepare verified core assets
    needs: validate-source
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Bootstrap pinned core assets
        run: bash scripts/bootstrap-core-assets.sh

      - name: Verify pinned GeoIP assets
        run: bash scripts/verify-core-assets.sh

      - name: Upload verified core assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: core-assets
          path: |
            SSRVPN_Android/android/app/src/main/jniLibs/arm64-v8a/libgojni.so
            SSRVPN_Android/assets/geoip.metadb.gz
            SSRVPN_Android/assets/libgojni-source.txt
            SSRVPN_MacOS/assets/AtlasCore.gz
            SSRVPN_MacOS/assets/geoip.metadb.gz
            SSRVPN_MacOS/assets/AtlasCore-source.txt
            SSRVPN_Windows/assets/mihomo.exe
            SSRVPN_Windows/assets/geoip.metadb.gz
            SSRVPN_Windows/assets/mihomo-source.txt
            docs/GEOIP_SOURCE.txt

  # ── Android ──
  build-android:
    name: Android APK
    needs: [shared-test, prepare-geoip]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Download verified core assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: core-assets
          path: .

      - name: Verify core assets
        run: bash scripts/verify-core-assets.sh

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: |
          cd packages/ssrvpn_shared && dart pub get
          cd ../../SSRVPN_Android && flutter pub get

      - name: Analyze
        run: cd SSRVPN_Android && flutter analyze

      - name: Test
        run: cd SSRVPN_Android && flutter test --coverage

      - name: Enforce coverage threshold
        run: bash scripts/check-coverage-thresholds.sh SSRVPN_Android

      - name: Android native unit tests
        run: bash scripts/test-android-native.sh

      - name: Prepare Android release signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          missing=0
          for name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name is not configured. Generate a free self-signed Android keystore and add it as a repository secret."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          KEYSTORE_PATH="$RUNNER_TEMP/ssrvpn-release.jks"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$KEYSTORE_PATH"
          cat > SSRVPN_Android/android/key.properties <<EOF
          storeFile=$KEYSTORE_PATH
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: Build APK
        run: |
          cd SSRVPN_Android
          flutter build apk --release
          cp build/app/outputs/flutter-apk/app-release.apk SSRVPN.apk

      - name: Smoke release artifact
        run: bash scripts/smoke-release-artifacts.sh --allow-missing

      - name: Verify APK signature
        env:
          ANDROID_RELEASE_CERT_SHA256: ${{ vars.ANDROID_RELEASE_CERT_SHA256 }}
        run: |
          set -euo pipefail
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -name apksigner -type f | sort -V | tail -1)"
          if [ -z "$APKSIGNER" ]; then
            echo "::error::apksigner not found in Android SDK build-tools"
            exit 1
          fi
          if [ -z "${ANDROID_RELEASE_CERT_SHA256:-}" ]; then
            echo "::error::ANDROID_RELEASE_CERT_SHA256 is not configured"
            exit 1
          fi
          cert_output="$("$APKSIGNER" verify --print-certs SSRVPN_Android/SSRVPN.apk)"
          printf '%s\n' "$cert_output"
          actual="$(printf '%s\n' "$cert_output" |
            sed -n 's/^.*certificate SHA-256 digest: //p' |
            head -1 | tr -d ':' | tr '[:upper:]' '[:lower:]')"
          expected="$(printf '%s' "$ANDROID_RELEASE_CERT_SHA256" |
            tr -d ':' | tr '[:upper:]' '[:lower:]')"
          if [ -z "$actual" ] || [ "$actual" != "$expected" ]; then
            echo "::error::APK signing certificate mismatch: expected $expected, got ${actual:-missing}"
            exit 1
          fi

      - name: Generate checksum
        run: cd SSRVPN_Android && sha256sum SSRVPN.apk > SSRVPN.apk.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: android
          path: |
            SSRVPN_Android/SSRVPN.apk
            SSRVPN_Android/SSRVPN.apk.sha256

  # ── macOS ──
  build-macos:
    name: macOS DMG
    needs: [shared-test, prepare-geoip]
    runs-on: macos-15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Download verified core assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: core-assets
          path: .

      - name: Verify core assets
        run: bash scripts/verify-core-assets.sh

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: |
          cd packages/ssrvpn_shared && dart pub get
          cd ../../SSRVPN_MacOS && flutter pub get

      - name: Analyze
        run: cd SSRVPN_MacOS && flutter analyze

      - name: Test
        run: cd SSRVPN_MacOS && flutter test --coverage

      - name: Enforce coverage threshold
        run: bash scripts/check-coverage-thresholds.sh SSRVPN_MacOS

      - name: Build & Package DMG
        run: cd SSRVPN_MacOS && bash tool/package_macos.sh

      - name: Verify drag-install DMG
        run: |
          set -euo pipefail
          test -f SSRVPN_MacOS/SSRVPN.dmg
          hdiutil verify SSRVPN_MacOS/SSRVPN.dmg

          MOUNT_DIR="$(mktemp -d)"
          cleanup() {
            if mount | grep -qF "$MOUNT_DIR"; then
              hdiutil detach "$MOUNT_DIR" -force >/dev/null 2>&1 || true
            fi
            rm -rf "$MOUNT_DIR"
          }
          trap cleanup EXIT

          hdiutil attach -readonly -nobrowse -mountpoint "$MOUNT_DIR" SSRVPN_MacOS/SSRVPN.dmg
          test -d "$MOUNT_DIR/SSRVPN.app"
          test -L "$MOUNT_DIR/Applications"

      - name: Smoke release artifact
        run: bash scripts/smoke-release-artifacts.sh --allow-missing

      - name: Generate checksum
        run: cd SSRVPN_MacOS && shasum -a 256 SSRVPN.dmg > SSRVPN.dmg.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: macos
          path: |
            SSRVPN_MacOS/SSRVPN.dmg
            SSRVPN_MacOS/SSRVPN.dmg.sha256

  # ── Windows ──
  build-windows:
    name: Windows installer
    needs: [shared-test, prepare-geoip]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Download verified core assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: core-assets
          path: .

      - name: Verify core assets
        run: bash scripts/verify-core-assets.sh

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: |
          cd packages/ssrvpn_shared; dart pub get
          cd ../../SSRVPN_Windows; flutter pub get

      - name: Analyze
        run: cd SSRVPN_Windows; flutter analyze

      - name: Test
        run: cd SSRVPN_Windows; flutter test --coverage

      - name: Enforce coverage threshold
        shell: bash
        run: bash scripts/check-coverage-thresholds.sh SSRVPN_Windows

      - name: Build Windows installer
        shell: powershell
        timeout-minutes: 15
        run: |
          cd SSRVPN_Windows
          # Windows PowerShell does not stop when a child process returns non-zero.
          # Keep every child exit check adjacent so later builds cannot mask a failure.
          powershell.exe -NoLogo -NoProfile -ExecutionPolicy Bypass -File ..\scripts\test_windows_powershell51_compatibility.ps1
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          powershell.exe -NoLogo -NoProfile -ExecutionPolicy Bypass -File ..\scripts\test_windows_installer_runtime.ps1
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $smokeRoot = Join-Path $env:RUNNER_TEMP 'ssrvpn-process-smoke'
          powershell.exe -NoLogo -NoProfile -ExecutionPolicy Bypass -File installer\stop_ssrvpn_processes.ps1 -InstalledAppPath "$smokeRoot\bin\ssrvpn_windows_app.exe" -InstalledLauncherPath "$smokeRoot\ssrvpn_windows.exe" -InstalledCorePath "$smokeRoot\bin\mihomo.exe" -InstalledCorePidPath "$smokeRoot\mihomo.pid"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          powershell.exe -NoLogo -NoProfile -ExecutionPolicy Bypass -File tool\package_windows.ps1
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          powershell.exe -NoLogo -NoProfile -ExecutionPolicy Bypass -File tool\build_installer.ps1
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          powershell.exe -NoLogo -NoProfile -ExecutionPolicy Bypass -File ..\scripts\test_windows_installer_package.ps1 -InstallerPath .\SSRVPN_Setup.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload Windows installer smoke logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: windows-installer-smoke-logs
          path: ${{ runner.temp }}/ssrvpn-installer-smoke/*.log
          if-no-files-found: ignore

      - name: Smoke release artifact
        run: bash scripts/smoke-release-artifacts.sh --allow-missing

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: windows
          path: |
            SSRVPN_Windows/SSRVPN_Setup.exe
            SSRVPN_Windows/SSRVPN_Setup.exe.sha256

  # ── GitHub Release ──
  publish:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-android, build-macos, build-windows]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      actions: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts

      - name: Generate release notes
        id: notes
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          python3 scripts/generate-release-notes.py \
            --tag "$TAG" \
            --output release-notes.md
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "body_path=release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Validate OSS publishing configuration
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_SECRET }}
          OSS_ENDPOINT: ${{ vars.ALIYUN_OSS_ENDPOINT }}
          OSS_BUCKET: ${{ vars.ALIYUN_OSS_BUCKET }}
          OSS_PREFIX: ${{ vars.ALIYUN_OSS_PREFIX }}
        run: |
          set -euo pipefail
          for name in OSS_ACCESS_KEY_ID OSS_ACCESS_KEY_SECRET OSS_ENDPOINT OSS_BUCKET OSS_PREFIX; do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name is not configured"
              exit 1
            fi
          done
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          source = Path(
              "packages/ssrvpn_shared/lib/services/update_checker.dart"
          ).read_text(encoding="utf-8")
          match = re.search(
              r"primaryManifestUrl\s*=\s*Uri\.parse\(\s*['\"]([^'\"]+)['\"]",
              source,
          )
          if match is None:
              raise SystemExit("cannot find the client's primary update manifest URL")
          configured_url = (
              f"https://{os.environ['OSS_BUCKET']}.{os.environ['OSS_ENDPOINT']}/"
              f"{os.environ['OSS_PREFIX']}/latest.json"
          )
          if configured_url != match.group(1):
              raise SystemExit(
                  "OSS workflow variables do not match the client's primary "
                  "update manifest URL"
              )
          PY

      - name: Reuse an existing GitHub release on retry
        id: existing_release
        env:
          GH_TOKEN: ${{ github.token }}
          ANDROID_RELEASE_CERT_SHA256: ${{ vars.ANDROID_RELEASE_CERT_SHA256 }}
        run: bash scripts/reuse-github-release-assets.sh artifacts

      - name: Generate release provenance
        run: |
          python3 scripts/generate-release-provenance.py \
            --tag "${GITHUB_REF#refs/tags/}" \
            --commit "$GITHUB_SHA" \
            --asset artifacts/android/SSRVPN.apk \
            --asset artifacts/macos/SSRVPN.dmg \
            --asset artifacts/windows/SSRVPN_Setup.exe \
            --output artifacts/SSRVPN-release-provenance.json

      - name: Generate verified OSS update manifest
        env:
          OSS_ENDPOINT: ${{ vars.ALIYUN_OSS_ENDPOINT }}
          OSS_BUCKET: ${{ vars.ALIYUN_OSS_BUCKET }}
          OSS_PREFIX: ${{ vars.ALIYUN_OSS_PREFIX }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/}"
          base_url="https://$OSS_BUCKET.$OSS_ENDPOINT/$OSS_PREFIX/releases/$tag"
          python3 scripts/generate-oss-release-manifest.py \
            --tag "$tag" \
            --base-url "$base_url" \
            --release-notes release-notes.md \
            --asset artifacts/android/SSRVPN.apk \
            --asset artifacts/macos/SSRVPN.dmg \
            --asset artifacts/windows/SSRVPN_Setup.exe \
            --output artifacts/oss/latest.json

      - name: Reject a public-channel rollback
        env:
          OSS_ENDPOINT: ${{ vars.ALIYUN_OSS_ENDPOINT }}
          OSS_BUCKET: ${{ vars.ALIYUN_OSS_BUCKET }}
          OSS_PREFIX: ${{ vars.ALIYUN_OSS_PREFIX }}
        run: |
          set -euo pipefail
          public_manifest="$RUNNER_TEMP/current-public-latest.json"
          public_url="https://$OSS_BUCKET.$OSS_ENDPOINT/$OSS_PREFIX/latest.json"
          status="$(curl -sS --retry 3 --connect-timeout 10 --max-time 30 \
            --max-filesize 1048576 -o "$public_manifest" \
            -w '%{http_code}' "$public_url" || true)"
          case "$status" in
            200)
              python3 scripts/verify-release-transition.py \
                --target "${GITHUB_REF#refs/tags/}" \
                --current-manifest "$public_manifest"
              ;;
            404)
              python3 scripts/verify-release-transition.py \
                --target "${GITHUB_REF#refs/tags/}"
              ;;
            *)
              echo "::error::Cannot verify current OSS release pointer (HTTP ${status:-network error})"
              exit 1
              ;;
          esac

      - name: Create GitHub Draft Release
        if: steps.existing_release.outputs.exists != 'true'
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          tag_name: ${{ steps.notes.outputs.tag }}
          name: SSRVPN ${{ steps.notes.outputs.tag }}
          body_path: ${{ steps.notes.outputs.body_path }}
          files: |
            artifacts/android/SSRVPN.apk
            artifacts/android/SSRVPN.apk.sha256
            artifacts/macos/SSRVPN.dmg
            artifacts/macos/SSRVPN.dmg.sha256
            artifacts/windows/SSRVPN_Setup.exe
            artifacts/windows/SSRVPN_Setup.exe.sha256
            artifacts/SSRVPN-release-provenance.json
          generate_release_notes: false
          draft: true
          make_latest: false
          overwrite_files: false
          fail_on_unmatched_files: true

      - name: Install pinned ossutil
        run: |
          bash scripts/install-ossutil.sh "$RUNNER_TEMP/bin"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Publish immutable release to OSS
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_SECRET }}
          OSS_ENDPOINT: ${{ vars.ALIYUN_OSS_ENDPOINT }}
          OSS_REGION: cn-qingdao
          OSS_BUCKET: ${{ vars.ALIYUN_OSS_BUCKET }}
          OSS_PREFIX: ${{ vars.ALIYUN_OSS_PREFIX }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/}"
          release_prefix="$OSS_PREFIX/releases/$tag"
          files=(
            artifacts/android/SSRVPN.apk
            artifacts/android/SSRVPN.apk.sha256
            artifacts/macos/SSRVPN.dmg
            artifacts/macos/SSRVPN.dmg.sha256
            artifacts/windows/SSRVPN_Setup.exe
            artifacts/windows/SSRVPN_Setup.exe.sha256
          )
          public_base="https://$OSS_BUCKET.$OSS_ENDPOINT"
          versioned_files=("${files[@]}" artifacts/oss/latest.json)
          for file in "${versioned_files[@]}"; do
            name="$(basename "$file")"
            object_url="$public_base/$release_prefix/$name"
            downloaded="$RUNNER_TEMP/versioned-$name"
            status="$(curl -sS --retry 3 --connect-timeout 10 --max-time 180 \
              --max-filesize 314572800 -o "$downloaded" \
              -w '%{http_code}' "$object_url" || true)"
            if [ "$status" = 200 ]; then
              cmp "$file" "$downloaded"
              continue
            elif [ "$status" != 404 ]; then
              echo "::error::Cannot inspect immutable OSS object $object_url (HTTP ${status:-network error})"
              exit 1
            fi
            ossutil cp "$file" "oss://$OSS_BUCKET/$release_prefix/$name" \
              --ignore-existing
            curl -fsSL --retry 3 --connect-timeout 10 --max-time 180 \
              --max-filesize 314572800 "$object_url" -o "$downloaded"
            cmp "$file" "$downloaded"
          done

      - name: Promote OSS public channel and finalize GitHub Release
        id: promote_oss
        env:
          GH_TOKEN: ${{ github.token }}
          OSS_ACCESS_KEY_ID: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_SECRET }}
          OSS_ENDPOINT: ${{ vars.ALIYUN_OSS_ENDPOINT }}
          OSS_REGION: cn-qingdao
          OSS_BUCKET: ${{ vars.ALIYUN_OSS_BUCKET }}
          OSS_PREFIX: ${{ vars.ALIYUN_OSS_PREFIX }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/}"
          public_assets="$RUNNER_TEMP/public-assets"
          backup_dir="$RUNNER_TEMP/ssrvpn-oss-backup.$GITHUB_RUN_ATTEMPT"
          mkdir -p "$public_assets"
          cp artifacts/android/SSRVPN.apk* "$public_assets/"
          cp artifacts/macos/SSRVPN.dmg* "$public_assets/"
          cp artifacts/windows/SSRVPN_Setup.exe* "$public_assets/"
          OSS_BACKUP_DIR="$backup_dir" OSS_PRESERVE_BACKUP=1 \
            bash scripts/promote-oss-public-channel.sh \
            "$public_assets" artifacts/oss/latest.json

          finalize_status=0
          gh release edit "$tag" --draft=false --prerelease=false --latest || \
            finalize_status=$?

          release_state=""
          for attempt in 1 2 3; do
            if release_state="$(gh release view "$tag" \
              --json isDraft,isPrerelease \
              --jq '[.isDraft, .isPrerelease] | @tsv' 2>/dev/null)"; then
              break
            fi
            release_state=""
            sleep "$attempt"
          done

          if [ "$release_state" = $'false\tfalse' ]; then
            rm -rf "$backup_dir"
            exit 0
          fi

          if [ -n "$release_state" ]; then
            echo "::error::GitHub release did not become public; restoring OSS."
            bash scripts/promote-oss-public-channel.sh --restore "$backup_dir"
            if [ "$finalize_status" -eq 0 ]; then
              finalize_status=1
            fi
            exit "$finalize_status"
          fi

          echo "::error::GitHub release state is ambiguous; OSS was not rolled back automatically."
          echo "::error::Use the preserved backup only after confirming the GitHub release state."
          exit 87

      - name: Verify published GitHub and OSS channels
        env:
          GH_TOKEN: ${{ github.token }}
          SSRVPN_REPO: ${{ github.repository }}
          OSS_ENDPOINT: ${{ vars.ALIYUN_OSS_ENDPOINT }}
          OSS_BUCKET: ${{ vars.ALIYUN_OSS_BUCKET }}
          OSS_PREFIX: ${{ vars.ALIYUN_OSS_PREFIX }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/}"
          release_json="$RUNNER_TEMP/published-release.json"
          latest_release_json="$RUNNER_TEMP/latest-release.json"
          manifest_json="$RUNNER_TEMP/published-latest.json"
          public_manifest_url="https://$OSS_BUCKET.$OSS_ENDPOINT/$OSS_PREFIX/latest.json"

          bash scripts/check-release-assets.sh "$tag"
          for attempt in 1 2 3; do
            if gh api "repos/$GITHUB_REPOSITORY/releases/tags/$tag" >"$release_json"; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "::error::Cannot read the published GitHub release."
              exit 1
            fi
            sleep "$attempt"
          done

          is_prerelease="$(python3 - "$release_json" "$tag" <<'PY'
          import json
          import sys

          with open(sys.argv[1], encoding="utf-8") as source:
              release = json.load(source)
          if release.get("tag_name") != sys.argv[2] or release.get("draft") is not False:
              raise SystemExit("published GitHub release tag/state mismatch")
          if not isinstance(release.get("prerelease"), bool):
              raise SystemExit("published GitHub release prerelease state is invalid")
          print("true" if release["prerelease"] else "false")
          PY
          )"

          if [ "$is_prerelease" != true ]; then
            latest_matches=false
            for attempt in 1 2 3 4 5; do
              if gh api "repos/$GITHUB_REPOSITORY/releases/latest" \
                  >"$latest_release_json" &&
                python3 - "$latest_release_json" "$release_json" <<'PY'
          import json
          import sys

          with open(sys.argv[1], encoding="utf-8") as source:
              latest = json.load(source)
          with open(sys.argv[2], encoding="utf-8") as source:
              release = json.load(source)
          if (
              latest.get("id") != release.get("id")
              or latest.get("tag_name") != release.get("tag_name")
              or latest.get("draft") is not False
              or latest.get("prerelease") is not False
          ):
              raise SystemExit(1)
          PY
              then
                latest_matches=true
                break
              fi
              sleep "$attempt"
            done
            if [ "$latest_matches" != true ]; then
              echo "::error::GitHub latest does not point to the published stable release."
              exit 1
            fi
          fi

          manifest_matches=false
          for attempt in 1 2 3 4 5; do
            manifest_request_url="${public_manifest_url}?verify=${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${attempt}"
            if curl -fsSL --retry 3 --connect-timeout 10 --max-time 30 \
                --max-filesize 1048576 \
                -H 'Cache-Control: no-cache' -H 'Pragma: no-cache' \
                "$manifest_request_url" -o "$manifest_json" &&
              python3 - "$manifest_json" "${tag#v}" <<'PY'
          import json
          import sys

          with open(sys.argv[1], encoding="utf-8") as source:
              manifest = json.load(source)
          if manifest.get("version") != sys.argv[2]:
              raise SystemExit(1)
          PY
            then
              manifest_matches=true
              break
            fi
            sleep "$attempt"
          done
          if [ "$manifest_matches" != true ]; then
            echo "::error::OSS latest.json does not point to the published version."
            exit 1
          fi

          python3 - "$release_json" "$manifest_json" "$tag" \
            "https://$OSS_BUCKET.$OSS_ENDPOINT/$OSS_PREFIX/releases/$tag" <<'PY'
          import json
          import re
          import sys

          release_path, manifest_path, tag, release_base_url = sys.argv[1:]
          with open(release_path, encoding="utf-8") as source:
              release = json.load(source)
          with open(manifest_path, encoding="utf-8") as source:
              manifest = json.load(source)

          binaries = {
              "SSRVPN.apk",
              "SSRVPN.dmg",
              "SSRVPN_Setup.exe",
          }
          expected_release_assets = binaries | {
              f"{name}.sha256" for name in binaries
          } | {"SSRVPN-release-provenance.json"}
          release_assets = release.get("assets")
          if not isinstance(release_assets, list):
              raise SystemExit("GitHub release assets are missing")
          release_by_name = {
              asset.get("name"): asset
              for asset in release_assets
              if isinstance(asset, dict)
          }
          if (
              len(release_by_name) != len(release_assets)
              or set(release_by_name) != expected_release_assets
          ):
              raise SystemExit("GitHub release assets are not canonical")

          manifest_assets = manifest.get("assets")
          if not isinstance(manifest_assets, list):
              raise SystemExit("OSS manifest assets are missing")
          manifest_by_name = {
              asset.get("name"): asset
              for asset in manifest_assets
              if isinstance(asset, dict)
          }
          if (
              len(manifest_by_name) != len(manifest_assets)
              or set(manifest_by_name) != binaries
          ):
              raise SystemExit("OSS manifest assets are not canonical")
          if manifest.get("version") != tag.removeprefix("v"):
              raise SystemExit("OSS manifest version does not match the release tag")

          digest_pattern = re.compile(r"[0-9a-f]{64}")
          for name in binaries:
              github_digest = str(release_by_name[name].get("digest") or "")
              if not github_digest.startswith("sha256:"):
                  raise SystemExit(f"GitHub asset digest is missing: {name}")
              github_digest = github_digest.removeprefix("sha256:").lower()
              manifest_asset = manifest_by_name[name]
              if (
                  digest_pattern.fullmatch(github_digest) is None
                  or manifest_asset.get("sha256") != github_digest
                  or manifest_asset.get("url") != f"{release_base_url}/{name}"
              ):
                  raise SystemExit(f"GitHub/OSS asset mismatch: {name}")
          PY

      - name: Preserve OSS recovery backup
        if: always() && steps.promote_oss.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: oss-public-channel-recovery-${{ github.run_attempt }}
          path: ${{ runner.temp }}/ssrvpn-oss-backup.*
          if-no-files-found: ignore
          retention-days: 7
