name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  FLUTTER_VERSION: '3.44.1'

jobs:
  # ── 共享包测试 ──
  shared-test:
    name: Shared package tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/ssrvpn_shared
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: bash ../../scripts/check-shared-barrel-imports.sh
      - run: bash ../../scripts/check-version-sync.sh
      - run: bash ../../scripts/check-android-native-bridge-guards.sh
      - run: bash ../../scripts/check-secrets.sh
      - run: dart pub get
      - run: dart analyze --fatal-infos
      - run: dart test

  prepare-geoip:
    name: Prepare latest GeoIP database
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true

      - name: Sync latest geoip.metadb
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python3 scripts/sync-geoip-metadb.py

      - name: Verify synced GeoIP assets
        run: bash scripts/verify-core-assets.sh

      - name: Upload GeoIP assets
        uses: actions/upload-artifact@v7
        with:
          name: geoip-assets
          path: |
            SSRVPN_Android/assets/geoip.metadb.gz
            SSRVPN_MacOS/assets/geoip.metadb.gz
            SSRVPN_Windows/assets/geoip.metadb.gz
            docs/GEOIP_SOURCE.txt

  # ── Android ──
  build-android:
    name: Android APK
    needs: [shared-test, prepare-geoip]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true

      - name: Download latest GeoIP assets
        uses: actions/download-artifact@v8
        with:
          name: geoip-assets
          path: .

      - name: Verify core assets
        run: bash scripts/verify-core-assets.sh

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: |
          cd packages/ssrvpn_shared && dart pub get
          cd ../../SSRVPN_Android && flutter pub get

      - name: Analyze
        run: cd SSRVPN_Android && flutter analyze

      - name: Test
        run: |
          cd packages/ssrvpn_shared && dart test
          cd ../../SSRVPN_Android && flutter test

      - name: Prepare Android release signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          missing=0
          for name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name is not configured. Generate a free self-signed Android keystore and add it as a repository secret."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          KEYSTORE_PATH="$RUNNER_TEMP/ssrvpn-release.jks"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$KEYSTORE_PATH"
          cat > SSRVPN_Android/android/key.properties <<EOF
          storeFile=$KEYSTORE_PATH
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: Build APK
        run: |
          cd SSRVPN_Android
          flutter build apk --release
          cp build/app/outputs/flutter-apk/app-release.apk SSRVPN.apk

      - name: Smoke release artifact
        run: bash scripts/smoke-release-artifacts.sh --allow-missing

      - name: Verify APK signature
        run: |
          set -euo pipefail
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -name apksigner -type f | sort -V | tail -1)"
          if [ -z "$APKSIGNER" ]; then
            echo "::error::apksigner not found in Android SDK build-tools"
            exit 1
          fi
          "$APKSIGNER" verify --print-certs SSRVPN_Android/SSRVPN.apk

      - name: Generate checksum
        run: cd SSRVPN_Android && sha256sum SSRVPN.apk > SSRVPN.apk.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: android
          path: |
            SSRVPN_Android/SSRVPN.apk
            SSRVPN_Android/SSRVPN.apk.sha256

  # ── macOS ──
  build-macos:
    name: macOS DMG
    needs: [shared-test, prepare-geoip]
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true

      - name: Download latest GeoIP assets
        uses: actions/download-artifact@v8
        with:
          name: geoip-assets
          path: .

      - name: Verify core assets
        run: bash scripts/verify-core-assets.sh

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: |
          cd packages/ssrvpn_shared && dart pub get
          cd ../../SSRVPN_MacOS && flutter pub get

      - name: Analyze
        run: cd SSRVPN_MacOS && flutter analyze

      - name: Test
        run: |
          cd packages/ssrvpn_shared && dart test
          cd ../../SSRVPN_MacOS && flutter test

      - name: Build & Package DMG
        run: cd SSRVPN_MacOS && bash tool/package_macos.sh

      - name: Verify drag-install DMG
        run: |
          set -euo pipefail
          test -f SSRVPN_MacOS/SSRVPN.dmg
          hdiutil verify SSRVPN_MacOS/SSRVPN.dmg

          MOUNT_DIR="$(mktemp -d)"
          cleanup() {
            if mount | grep -qF "$MOUNT_DIR"; then
              hdiutil detach "$MOUNT_DIR" -force >/dev/null 2>&1 || true
            fi
            rm -rf "$MOUNT_DIR"
          }
          trap cleanup EXIT

          hdiutil attach -readonly -nobrowse -mountpoint "$MOUNT_DIR" SSRVPN_MacOS/SSRVPN.dmg
          test -d "$MOUNT_DIR/SSRVPN.app"
          test -L "$MOUNT_DIR/Applications"

      - name: Smoke release artifact
        run: bash scripts/smoke-release-artifacts.sh --allow-missing

      - name: Generate checksum
        run: cd SSRVPN_MacOS && shasum -a 256 SSRVPN.dmg > SSRVPN.dmg.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos
          path: |
            SSRVPN_MacOS/SSRVPN.dmg
            SSRVPN_MacOS/SSRVPN.dmg.sha256

  # ── Windows ──
  build-windows:
    name: Windows ZIP
    needs: [shared-test, prepare-geoip]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true

      - name: Download latest GeoIP assets
        uses: actions/download-artifact@v8
        with:
          name: geoip-assets
          path: .

      - name: Verify core assets
        run: bash scripts/verify-core-assets.sh

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: |
          cd packages/ssrvpn_shared; dart pub get
          cd ../../SSRVPN_Windows; flutter pub get

      - name: Analyze
        run: cd SSRVPN_Windows; flutter analyze

      - name: Test
        run: |
          cd packages/ssrvpn_shared; dart test
          cd ../../SSRVPN_Windows; flutter test

      - name: Build & Package ZIP
        shell: powershell
        run: |
          cd SSRVPN_Windows
          powershell.exe -NoLogo -NoProfile -ExecutionPolicy Bypass -File tool\package_windows.ps1

      - name: Verify portable ZIP
        shell: powershell
        run: |
          $zip = 'SSRVPN_Windows\SSRVPN.zip'
          if (-not (Test-Path -LiteralPath $zip -PathType Leaf)) {
            throw "Windows ZIP was not created: $zip"
          }

          $verifyRoot = Join-Path $env:RUNNER_TEMP "ssrvpn-zip-$([Guid]::NewGuid().ToString('N'))"
          Expand-Archive -LiteralPath $zip -DestinationPath $verifyRoot
          $portableRoot = Join-Path $verifyRoot 'SSRVPN_Windows_Release'
          foreach ($relativePath in @(
            'ssrvpn_windows.exe',
            'bin\ssrvpn_windows_app.exe',
            'bin\mihomo.exe',
            'SHA256SUMS.txt',
            'bin\data\flutter_assets\assets\geoip.metadb.gz'
          )) {
            $path = Join-Path $portableRoot $relativePath
            if (-not (Test-Path -LiteralPath $path -PathType Leaf)) {
              throw "Portable ZIP is missing $relativePath"
            }
          }
          $rootExeFiles = @(Get-ChildItem -LiteralPath $portableRoot -File -Filter '*.exe')
          if ($rootExeFiles.Count -ne 1 -or $rootExeFiles[0].Name -ne 'ssrvpn_windows.exe') {
            $names = ($rootExeFiles | ForEach-Object { $_.Name }) -join ', '
            throw "Portable ZIP root must contain exactly one user-facing exe: $names"
          }
          Remove-Item -LiteralPath $verifyRoot -Recurse -Force

      - name: Smoke release artifact
        run: bash scripts/smoke-release-artifacts.sh --allow-missing

      - name: Generate checksum
        shell: powershell
        run: |
          cd SSRVPN_Windows
          $hash = (Get-FileHash SSRVPN.zip -Algorithm SHA256).Hash.ToLower()
          [System.IO.File]::WriteAllText(
            (Join-Path (Get-Location) 'SSRVPN.zip.sha256'),
            "$hash  SSRVPN.zip`n",
            [System.Text.Encoding]::ASCII
          )

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows
          path: |
            SSRVPN_Windows/SSRVPN.zip
            SSRVPN_Windows/SSRVPN.zip.sha256

  # ── GitHub Release ──
  publish:
    name: Publish Release
    needs: [build-android, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Generate release notes
        id: notes
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          python3 scripts/generate-release-notes.py \
            --tag "$TAG" \
            --output release-notes.md
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "body_path=release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.notes.outputs.tag }}
          name: SSRVPN ${{ steps.notes.outputs.tag }}
          body_path: ${{ steps.notes.outputs.body_path }}
          files: |
            artifacts/android/SSRVPN.apk
            artifacts/android/SSRVPN.apk.sha256
            artifacts/macos/SSRVPN.dmg
            artifacts/macos/SSRVPN.dmg.sha256
            artifacts/windows/SSRVPN.zip
            artifacts/windows/SSRVPN.zip.sha256
          generate_release_notes: false
