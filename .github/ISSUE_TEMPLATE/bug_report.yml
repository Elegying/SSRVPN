name: Bug report
description: Report a reproducible problem in SSRVPN.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Android
        - macOS
        - Windows
        - Shared package
        - CI/release
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the behavior and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Redact subscription URLs, API secrets, passwords, bearer tokens, and proxy credentials.
      render: text
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v2.0.0 or commit SHA
