name: Maintenance task
description: Track refactors, dependency updates, release work, or repository hygiene.
title: "[Maintenance]: "
labels: ["maintenance", "triage"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Shared package
        - Android
        - macOS
        - Windows
        - CI/release
        - Documentation
        - Security
    validations:
      required: true
  - type: textarea
    id: task
    attributes:
      label: Task
      description: Describe the maintenance work and why it matters.
    validations:
      required: true
  - type: textarea
    id: checklist
    attributes:
      label: Checklist
      value: |
        - [ ] Implementation
        - [ ] Tests or verification
        - [ ] Documentation update
        - [ ] Release note if user-visible
