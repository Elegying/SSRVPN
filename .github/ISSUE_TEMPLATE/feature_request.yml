name: Feature request
description: Suggest an improvement or new capability.
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Android
        - macOS
        - Windows
        - Shared package
        - CI/release
        - Documentation
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem or user need
      description: What workflow, bug risk, or maintenance problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
